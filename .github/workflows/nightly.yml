name: Nightly Regression

on:
  # schedule:
    # - cron: '0 2 * * *'  # 2 AM UTC daily
  workflow_dispatch:

env:
  PLAYWRIGHT_ENV: ci

jobs:
  nightly-regression:
    name: Nightly Regression Suite
    runs-on: ubuntu-latest
    timeout-minutes: 120
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install --with-deps
      
      - name: Create report directories
        run: mkdir -p reports/html reports/allure-results reports/allure-report

      - name: Run full regression
        run: |
          pytest tests/ \
            -m regression \
            -n 4 \
            --html=reports/html/nightly-report.html \
            --self-contained-html \
            --alluredir=reports/allure-results \
            --reruns 2 \
            --reruns-delay 5 \
            -v
        continue-on-error: true

      - name: Generate report
        if: always()
        run: |
          npm install -g allure-commandline --save-dev
          allure generate reports/allure-results -o reports/allure-report --clean || true
      
      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nightly-regression-report
          path: reports/
          retention-days: 30
      
      - name: Send Slack notification
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: 'Nightly regression tests failed!'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
