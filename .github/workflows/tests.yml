name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main,master]
  # schedule:
  #   # Run nightly at 2 AM UTC
  #   - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      test_suite:
        description: 'Test suite to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - smoke
          - regression
          - e2e

env:
  PLAYWRIGHT_ENV: ci

jobs:
  # Smoke tests - quick feedback
  smoke:
    name: Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps
      
      - name: Run smoke tests
        run: |
          pytest tests/ -m smoke \
            -n 2 \
            --html=reports/html/smoke-report.html \
            --self-contained-html \
            -v
      
      - name: Upload smoke report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-report
          path: reports/html/
          retention-days: 7

  # Full test suite
  full-tests:
    name: Full Tests (${{ matrix.browser }})
    runs-on: ubuntu-latest
    needs: smoke
    timeout-minutes: 60
    
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
        shard: [1, 2, 3, 4]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install ${{ matrix.browser }} --with-deps
      
      - name: Run tests (shard ${{ matrix.shard }}/4)
        env:
          BROWSER: ${{ matrix.browser }}
        run: |
          pytest tests/ \
            --browser ${{ matrix.browser }} \
            --numprocesses 2 \
            --splits 4 \
            --group ${{ matrix.shard }} \
            --html=reports/html/report-${{ matrix.browser }}-${{ matrix.shard }}.html \
            --self-contained-html \
            --alluredir=reports/allure-results-${{ matrix.browser }}-${{ matrix.shard }} \
            -v
        continue-on-error: true
      
      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report-${{ matrix.browser }}-${{ matrix.shard }}
          path: |
            reports/html/
            reports/allure-results-*/
          retention-days: 7
      
      - name: Upload artifacts on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: failure-artifacts-${{ matrix.browser }}-${{ matrix.shard }}
          path: |
            artifacts/screenshots/
            artifacts/videos/
            artifacts/traces/
          retention-days: 7

  # Merge and publish reports
  publish-report:
    name: Publish Report
    runs-on: ubuntu-latest
    needs: full-tests
    if: always()
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all reports
        uses: actions/download-artifact@v4
        with:
          path: downloaded-reports/
      
      - name: Merge Allure results
        run: |
          mkdir -p reports/allure-results
          find downloaded-reports -name "*.json" -exec cp {} reports/allure-results/ \;
      
      - name: Generate Allure report
        uses: simple-elf/allure-report-action@master
        if: always()
        with:
          allure_results: reports/allure-results
          allure_report: reports/allure-report
          allure_history: allure-history
          keep_reports: 20
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: reports/allure-report
          destination_dir: test-reports
      
      - name: Add report link to summary
        run: |
          echo "## Test Report" >> $GITHUB_STEP_SUMMARY
          echo "[View Allure Report](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/test-reports/)" >> $GITHUB_STEP_SUMMARY
