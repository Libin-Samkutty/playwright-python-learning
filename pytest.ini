[pytest]
testpaths = tests
python_files = test_*.py
python_functions = test_*
python_classes = Test*

# Verbose output
addopts = 
    -v
    --tb=short
    --strict-markers
    --showlocals
    --html=reports/html/report.html
    --self-contained-html
    --alluredir=reports/allure-results

    
# Continue after first failure (default)
# Use -x to stop at first failure

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s (%(filename)s:%(lineno)s)
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Markers
markers =
    smoke: Quick sanity tests (run frequently)
    regression: Full regression tests (run before release)
    slow: Tests that take a long time
    login: Tests related to login functionality
    cart: Tests related to shopping cart
    checkout: Tests related to checkout process
    wip: Work in progress (not ready)

# Timeout (requires pytest-timeout)
; timeout = 300
